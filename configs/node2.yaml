node:
  id: "node2"
  addr: "0.0.0.0:7000"

raft:
  addr: "0.0.0.0:7001"
  data_dir: "/data/raft"
  bootstrap: false
  heartbeat_timeout: "500ms"
  election_timeout: "1s"
  snapshot_threshold: 10000
  peers:
    - id: "node1"
      addr: "oncloudkv-node1:7001"
    - id: "node3"
      addr: "oncloudkv-node3:7001"

storage:
  data_dir: "/data/kv"
  memtable_size_mb: 64
  compaction_interval_secs: 30

grpc:
  addr: "0.0.0.0:7002"

http:
  addr: "0.0.0.0:7003"

metrics:
  addr: "0.0.0.0:7004"
